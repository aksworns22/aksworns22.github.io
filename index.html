<!doctype html>
<html lang="ko">

    <meta charset="UTF-8" />

    <!-- Set theme before paint to avoid a flash of the wrong color scheme -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var theme =
            saved ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light')
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/gh/fonts-archive/MaruBuri/MaruBuri.css"
      rel="stylesheet"
    />
  </head>

  </body>
</html>
